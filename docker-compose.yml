
services:

  db:

    image: postgres:17

    container_name: scientific_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scientific_articles

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:

    build: ./backend

    container_name: scientific_backend

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scientific_articles

    volumes:
      - ./backend:/app


  frontend:

    build: ./frontend

    container_name: scientific_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  prometheus:

    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml


  grafana:

    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"


volumes:

  postgres_data: